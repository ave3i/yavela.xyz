<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yavela | Reset Password</title>
<link rel="icon" type="image/png" href="https://files.yavela.xyz/data/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{ --bg:#090909; --accent:#c4c9cd; --input:#141414; --green:#3ecf8e; --red:#f75d5d; }
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); color:var(--accent); }
.box{ width:100%; max-width:400px; }
.header{ display:flex; align-items:center; gap:12px; margin-bottom:28px; }
.logo{ width:52px; filter:brightness(0) saturate(100%) invert(82%) sepia(6%) saturate(118%) hue-rotate(169deg); }
h1{ font-size:38px; font-weight:900; }
.sub{ font-size:13px; color:#555; margin-bottom:24px; line-height:1.6; }
.input-box{ margin-bottom:14px; }
.input-field{
    width:100%; height:46px; border:none;
    background:var(--input); padding:0 14px;
    color:var(--accent); outline:none; border-radius:10px;
    font-size:14px; transition:all .35s cubic-bezier(.22,1,.36,1);
}
.input-field:focus{ background:#181818; transform:scale(1.01); }
.submit{
    width:100%; height:46px; border:none; border-radius:10px;
    background:var(--accent); color:#090909; font-weight:800;
    cursor:pointer; transition:all .3s cubic-bezier(.22,1,.36,1);
    font-family:'Poppins',sans-serif; font-size:14px; margin-top:4px;
}
.submit:hover{ background:#d0d5d9; transform:translateY(-1px); }
.submit:active{ transform:scale(.97); }
.submit:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
.msg{ margin-top:12px; font-size:12px; min-height:18px; }
.msg.ok{ color:var(--green); }
.msg.err{ color:var(--red); }

.success-state{ display:none; text-align:center; }
.success-icon{ font-size:48px; margin-bottom:16px; }
.success-title{ font-size:24px; font-weight:900; margin-bottom:8px; }
.success-sub{ font-size:13px; color:#555; margin-bottom:24px; }
.go-btn{
    display:inline-block; padding:12px 32px;
    background:var(--accent); color:#090909;
    font-weight:800; font-size:14px; border-radius:10px;
    text-decoration:none; transition:all .3s cubic-bezier(.22,1,.36,1);
}
.go-btn:hover{ background:#d0d5d9; transform:translateY(-1px); }

.footer{ text-align:center; font-size:12px; color:#333; margin-top:32px; }
</style>
</head>
<body>
<div class="box">

  <div id="formState">
    <div class="header">
      <img src="https://files.yavela.xyz/data/logo.png" class="logo">
      <h1>New<br>Password.</h1>
    </div>
    <p class="sub">Choose a strong new password for your Yavela account.</p>

    <div class="input-box">
      <input id="password" type="password" class="input-field" placeholder="new password" autocomplete="new-password">
    </div>
    <div class="input-box">
      <input id="confirmPassword" type="password" class="input-field" placeholder="confirm password" autocomplete="new-password">
    </div>

    <button class="submit" id="submitBtn" onclick="doReset()">Set New Password</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="success-state" id="successState">
    <div class="success-icon">🔓</div>
    <div class="success-title">Password updated!</div>
    <p class="success-sub">Your password has been changed successfully.<br>You can now log in with your new password.</p>
    <a href="/" class="go-btn">Go to Login</a>
  </div>

  <div class="footer">© 2026 Yavela • All rights reserved</div>
</div>

<script>
const { createClient } = supabase;
const _supabase = createClient('__SUPABASE_URL__', '__SUPABASE_ANON_KEY__');

_supabase.auth.onAuthStateChange(async (event) => {
    if (event === 'PASSWORD_RECOVERY') {
    }
});

const msg = document.getElementById('msg');

function setMsg(text, cls) {
    msg.textContent = text;
    msg.className   = 'msg ' + cls;
}

async function doReset() {
    const pw  = document.getElementById('password').value;
    const cpw = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('submitBtn');

    if (!pw || !cpw)     { setMsg('Please fill in both fields.', 'err'); return; }
    if (pw.length < 6)   { setMsg('Password must be at least 6 characters.', 'err'); return; }
    if (pw !== cpw)      { setMsg('Passwords do not match.', 'err'); return; }

    btn.disabled    = true;
    btn.textContent = 'Updating…';

    const { error } = await _supabase.auth.updateUser({ password: pw });

    if (error) {
        setMsg(error.message, 'err');
        btn.disabled    = false;
        btn.textContent = 'Set New Password';
    } else {
        document.getElementById('formState').style.display   = 'none';
        document.getElementById('successState').style.display = 'block';
        setTimeout(() => { window.location.href = '/'; }, 3000);
    }
}

document.addEventListener('keydown', (e) => { if (e.key === 'Enter') doReset(); });
</script>
</body>
</html>
