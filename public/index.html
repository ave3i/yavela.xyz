<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yavela | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
    --bg:#090909;
    --accent:#c4c9cd;
    --input:#141414;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    color:var(--accent);
}
.login-box{
    width:100%;
    max-width:400px;
}
.login-header{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:26px;
}
.logo{
    width:60px;
    filter: brightness(0) saturate(100%) invert(82%) sepia(6%) saturate(118%) hue-rotate(169deg);
}
h1{
    font-size:42px;
    font-weight:900;
}
.input-box{
    margin-bottom:14px;
}
.input-field{
    width:100%;
    height:46px;
    border:none;
    background:var(--input);
    padding:0 14px;
    color:var(--accent);
    outline:none;
    border-radius:10px;
    transition:all .35s cubic-bezier(.22,1,.36,1);
    font-size:14px;
}
.input-field:focus{
    background:#181818;
    transform:scale(1.01);
}
.forgot{
    display:inline-block;
    font-size:12px;
    margin-bottom:18px;
    color:#777;
    text-decoration:none;
    transition:color .25s ease, transform .25s ease;
}
.forgot:hover{
    color:var(--accent);
    transform:translateX(2px);
}
.submit{
    width:100%;
    height:46px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:#090909;
    font-weight:800;
    cursor:pointer;
    transition:all .3s cubic-bezier(.22,1,.36,1);
    font-family:'Poppins',sans-serif;
    font-size:14px;
}
.submit:hover{
    background:#d0d5d9;
    transform:translateY(-1px);
}
.submit:active{
    transform:scale(0.97);
}
.submit:disabled{
    opacity:0.6;
    cursor:not-allowed;
    transform:none;
}
.switch{
    margin-top:14px;
    font-size:12px;
}
.switch a{
    color:var(--accent);
    text-decoration:none;
    transition:opacity .25s ease;
}
.switch a:hover{ opacity:0.7; }
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:800px;
}
.footer{
    text-align:center;
    font-size:12px;
    color:#555;
    margin-top:20px;
}
.msg{
    margin-top:12px;
    font-size:12px;
    min-height:18px;
    transition:color .2s;
}
.msg.error{ color:#f75d5d; }
.msg.success{ color:#3ecf8e; }
</style>
</head>
<body>
<div class="container">
    <div class="login-box">
        <div class="login-header">
            <img src="https://files.yavela.xyz/data/logo.png" class="logo">
            <h1>Login.</h1>
        </div>
        <div class="input-box">
            <input id="email" type="email" class="input-field" placeholder="email@example.com" required>
        </div>
        <div class="input-box">
            <input id="password" type="password" class="input-field" placeholder="••••••••" required>
        </div>
        <a href="#" class="forgot" id="forgotBtn">Forgot Password?</a>
        <button class="submit" id="loginBtn">Sign In</button>
        <div class="msg" id="msg"></div>
        <div class="switch">
            Don't have an account? <a href="/register">Sign up</a>
        </div>
    </div>
    <div class="footer">
        © 2026 Yavela • All rights reserved
    </div>
</div>

<script>
    const { createClient } = supabase;
    const _supabase = createClient('__SUPABASE_URL__', '__SUPABASE_ANON_KEY__');

    (async () => {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) window.location.href = '/dashboard.html';
    })();

    const msg      = document.getElementById('msg');
    const loginBtn = document.getElementById('loginBtn');

    function setMsg(text, type) {
        msg.textContent = text;
        msg.className   = 'msg ' + type;
    }

    loginBtn.addEventListener('click', async () => {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) { setMsg('Please fill in all fields.', 'error'); return; }

        loginBtn.disabled    = true;
        loginBtn.textContent = 'Signing in…';

        const { error } = await _supabase.auth.signInWithPassword({ email, password });

        if (error) {
            setMsg(error.message, 'error');
            loginBtn.disabled    = false;
            loginBtn.textContent = 'Sign In';
        } else {
            window.location.href = '/dashboard.html';
        }
    });

    document.getElementById('forgotBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        if (!email) { setMsg('Enter your email above first.', 'error'); return; }

        const { error } = await _supabase.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/reset-password.html'
        });
        setMsg(
            error ? error.message : 'Password reset email sent!',
            error ? 'error' : 'success'
        );
    });

    document.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginBtn.click(); });
</script>
</body>
</html>
